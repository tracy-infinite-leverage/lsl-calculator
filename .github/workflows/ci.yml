name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when new commits arrive — saves minutes
# on rapid pushes during PR iteration.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: TypeScript · Vitest · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Vitest (gold-standard suite + unit tests)
        run: npx vitest run

      - name: Build
        # Use a placeholder ANTHROPIC_API_KEY for the build phase only.
        # The build doesn't make API calls — this just satisfies the env-var
        # check on module init in src/server/anthropic.ts at module load.
        env:
          ANTHROPIC_API_KEY: build-time-placeholder
        run: npm run build

  playwright:
    name: Playwright (chromium · webkit · firefox · mobile-chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Run Playwright matrix
        # The CI env var triggers the full browser matrix in playwright.config.ts.
        # Mock-based PDF tests work without a real Anthropic key — the placeholder
        # is sufficient because the route is mocked via page.route().
        env:
          CI: true
          ANTHROPIC_API_KEY: build-time-placeholder
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7
