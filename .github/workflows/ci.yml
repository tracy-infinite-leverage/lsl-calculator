name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # workflow_dispatch lets us manually re-fire CI against any ref when the
  # pull_request:synchronize webhook fails to schedule a run (a known GitHub
  # behaviour — see PR #32 incident on 2026-05-26: the merge-from-main commit
  # e386b1d and the empty commit ee83624 both produced zero workflow runs,
  # leaving branch protection waiting on required checks that would never
  # arrive). Recovery: Actions tab → CI → "Run workflow" → pick the stuck
  # branch. The required check contexts will register against HEAD on
  # completion and unblock the merge.
  workflow_dispatch:

# Cancel in-flight runs on the same ref when new commits arrive — saves minutes
# on rapid pushes during PR iteration.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: TypeScript · Vitest · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Vitest (gold-standard suite + unit tests + Phase 4 auth integration)
        # The three Supabase env vars below are required by the Phase 4 auth
        # integration suites at website/src/__tests__/auth/ — they hit the
        # `lsl-platform` Supabase project to verify AC-AUTH-1 / AC-AUTH-13 /
        # AC-AUTH-14. Without them, the suites hard-fail at module init in
        # CI (CI=true is set by GitHub Actions by default) so a misconfigured
        # CI never silently passes the load-bearing cross-tenant RLS test.
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx vitest run

      - name: Build
        run: npm run build

  # E2 per-state matrix — runs each state's suite in its own shard.
  # New states append a value to the matrix as they ship.
  # See E2 impl-plan §P0.3 and tasks.md §T1.9.
  state-matrix:
    name: 'State suite · ${{ matrix.state }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website
    strategy:
      fail-fast: false
      matrix:
        state: [nsw, vic, qld, wa, sa, act, engine]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci

      - name: Run state suite
        run: |
          if [ "${{ matrix.state }}" = "engine" ]; then
            npx vitest run src/lib/lsl/engine
          else
            npx vitest run src/lib/lsl/states/${{ matrix.state }}
          fi

      - name: Record shard duration
        if: always()
        run: |
          echo "### State suite · ${{ matrix.state }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_STEP_SUMMARY"

  # Cross-state regression — engine-touching PRs run ALL state suites and a
  # quick summary surfaces per-state pass/fail in the step summary.
  # The path filter on `paths` keeps this off the critical path for non-engine PRs.
  # See E2 impl-plan §P0.3 / AC22.
  cross-state-regression:
    name: Cross-state regression (engine-touching PRs)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether PR touches engine or citations
        id: filter
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD || true)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -E '^website/src/lib/lsl/engine/|^website/src/lib/lsl/dispatch\.ts$|^website/src/lib/lsl/states/[^/]+/continuous-service-rules\.ts$'; then
            echo "engine_touched=true" >> "$GITHUB_OUTPUT"
          else
            echo "engine_touched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.filter.outputs.engine_touched == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install
        if: steps.filter.outputs.engine_touched == 'true'
        run: npm ci

      - name: Run all state suites and engine suite
        if: steps.filter.outputs.engine_touched == 'true'
        run: |
          set -e
          echo "## Cross-state regression results" >> "$GITHUB_STEP_SUMMARY"
          STATUS_NSW=pass
          STATUS_VIC=pass
          STATUS_QLD=pass
          STATUS_WA=pass
          STATUS_SA=pass
          STATUS_ACT=pass
          STATUS_ENGINE=pass
          npx vitest run src/lib/lsl/states/nsw || STATUS_NSW=fail
          npx vitest run src/lib/lsl/states/vic || STATUS_VIC=fail
          npx vitest run src/lib/lsl/states/qld || STATUS_QLD=fail
          npx vitest run src/lib/lsl/states/wa || STATUS_WA=fail
          npx vitest run src/lib/lsl/states/sa || STATUS_SA=fail
          npx vitest run src/lib/lsl/states/act || STATUS_ACT=fail
          npx vitest run src/lib/lsl/engine || STATUS_ENGINE=fail
          echo "| Suite | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| NSW | $STATUS_NSW |" >> "$GITHUB_STEP_SUMMARY"
          echo "| VIC | $STATUS_VIC |" >> "$GITHUB_STEP_SUMMARY"
          echo "| QLD | $STATUS_QLD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WA | $STATUS_WA |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SA | $STATUS_SA |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ACT | $STATUS_ACT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| engine | $STATUS_ENGINE |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$STATUS_NSW" = "fail" ] || [ "$STATUS_VIC" = "fail" ] || [ "$STATUS_QLD" = "fail" ] || [ "$STATUS_WA" = "fail" ] || [ "$STATUS_SA" = "fail" ] || [ "$STATUS_ACT" = "fail" ] || [ "$STATUS_ENGINE" = "fail" ]; then
            exit 1
          fi

      - name: Skipped (no engine-layer changes)
        if: steps.filter.outputs.engine_touched != 'true'
        run: echo "No engine-layer files touched — cross-state regression not required."

  playwright:
    name: Playwright (chromium · webkit · firefox · mobile-chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Run Playwright matrix
        # The CI env var triggers the full browser matrix in playwright.config.ts.
        # The Supabase env vars are required for the auth E2E (Task 5.8) to hit
        # the live lsl-platform project. CI_TEST_HELPER_TOKEN is the gate flag
        # for the /api/test-helpers/confirm-user route used by the E2E to
        # simulate the email-verification click without real SMTP. The token
        # is a CI-only secret — it MUST NOT be added to any Vercel environment.
        # See docs/engineering/changes/2026-05-29-e51-auth-phase-6/HANDOFF-task-5.8-devops.md.
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI_TEST_HELPER_TOKEN:          ${{ secrets.CI_TEST_HELPER_TOKEN }}
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7

  # Test-sanctity guard — E6.2 Task 2.11 (spec §5.3 + SC-7).
  #
  # Spec §5.3 mandates that E6 PRs MUST NOT modify the 2214/2214 LSL test suite
  # or the 92 Playwright tests. SC-7 makes that an explicit success criterion.
  # This job makes the rule machine-enforceable rather than honour-based: it
  # diffs the protected test surfaces against origin/main and fails the build
  # if anything has changed.
  #
  # Protected paths (the "tests/" surface in this project — there is no
  # top-level tests/ folder, so the canonical interpretation is the actual
  # test files):
  #   - website/e2e/                          — Playwright matrix (92 tests)
  #   - website/src/lib/lsl/engine/           — 2214 LSL gold-standard engine tests
  #   - website/src/lib/lsl/states/           — per-state vitest suites
  #   - website/src/__tests__/                — auth integration tests
  #
  # Operator-override mechanism: include the literal token `[skip-test-guard]`
  # in the PR title. We do NOT honour --no-verify (it bypasses ALL hooks, not
  # just this one) and we do NOT honour an env-var bypass (would defeat the
  # purpose). The PR-title token is reviewable in GitHub and leaves a paper
  # trail in the merge commit history.
  #
  # See docs/qa/e6-test-sanctity.md for the contributor-facing rule.
  test-sanctity:
    name: Test-sanctity guard (spec §5.3 + SC-7)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git diff origin/main` can resolve the merge-base.
          fetch-depth: 0

      - name: Check for [skip-test-guard] in PR title
        id: skip
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qF '[skip-test-guard]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Test-sanctity guard SKIPPED via [skip-test-guard] in PR title."
            echo "::warning::PR title: $PR_TITLE"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff protected test surfaces against origin/main
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -e
          # Resolve the merge-base so a stale branch doesn't false-positive on
          # tests that landed on main after the branch was cut.
          BASE_SHA=$(git merge-base origin/main HEAD)
          echo "Comparing HEAD against merge-base $BASE_SHA"

          PROTECTED_PATHS=(
            "website/e2e"
            "website/src/lib/lsl/engine"
            "website/src/lib/lsl/states"
            "website/src/__tests__"
          )

          DIFF=$(git diff --name-status "$BASE_SHA" HEAD -- "${PROTECTED_PATHS[@]}" || true)

          if [ -n "$DIFF" ]; then
            echo "::error::E6 test-sanctity guard FAILED — protected test paths were modified."
            echo "::error::Spec §5.3 + SC-7: the 2214 LSL suite and 92 Playwright tests are off-limits in E6 PRs."
            echo ""
            echo "Changed files under protected paths:"
            echo "$DIFF"
            echo ""
            echo "If this change is intentional and reviewed by the operator, add"
            echo "the literal token [skip-test-guard] to the PR title to override."
            echo "See docs/qa/e6-test-sanctity.md for the full rule."
            exit 1
          fi

          echo "Test-sanctity guard passed — no protected test files modified."
