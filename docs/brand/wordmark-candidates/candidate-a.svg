<?xml version="1.0" encoding="UTF-8"?>
<!--
  Candidate A — Horizontal "by APA" lockup (Xero Practice Manager precedent)
  Primary:   "LSL Calculator"                       — Montserrat Semibold, navy #48608a
  Divider:   1pt vertical rule, grey-blue #a0aec1   — per APA Brand Guidelines v2 p.10
  Secondary: "by Australian Payroll Association"   — Source Sans Pro Regular, navy #48608a
  Posture:   Tight, conservative, single-line. Reads as a confident sibling product.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="LSL Calculator by Australian Payroll Association — Candidate A">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Source+Sans+3:wght@400&display=swap');
      .primary  { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; fill: #48608a; }
      .secondary{ font-family: 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; fill: #48608a; }
    ]]></style>
  </defs>
  <rect width="1200" height="280" fill="#ffffff"/>

  <!-- Primary mark -->
  <text x="60" y="170" class="primary" font-size="96" letter-spacing="-1.5">LSL Calculator</text>

  <!-- Divider rule, per APA brand collaboration spec page 10 -->
  <line x1="770" y1="115" x2="770" y2="200" stroke="#a0aec1" stroke-width="2"/>

  <!-- Secondary mark, two-line for breathing room -->
  <text x="795" y="148" class="secondary" font-size="22" letter-spacing="0.4">by Australian</text>
  <text x="795" y="180" class="secondary" font-size="22" letter-spacing="0.4">Payroll Association</text>
</svg>
