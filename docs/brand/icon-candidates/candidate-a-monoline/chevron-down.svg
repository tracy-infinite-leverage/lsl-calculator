<!--
  Candidate A — Monoline
  Icon: ChevronDown (dropdowns, accordion, select trigger, UserMenu)
  Stroke: 1.5px navy #48608a. The smallest icon in the surface — its role
  is purely directional, so the simplest mark wins.
-->
