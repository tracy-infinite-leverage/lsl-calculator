<?xml version="1.0" encoding="UTF-8"?>
<!--
  Candidate A — Monoline
  Icon: Calculator (sidebar Valuations, public-calc CTA)
  Stroke: 1.5px navy #48608a. Pure restraint per direction §3 ("Pay/currency
  restraint demo — no gold even though it's a money icon").
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
     fill="none" stroke="#48608a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Calculator">
  <!-- Body -->
  <rect x="4" y="2.5" width="16" height="19" rx="2"/>
  <!-- Display -->
  <rect x="6.5" y="5" width="11" height="4" rx="0.75"/>
  <!-- Keys: 3x3 grid -->
  <line x1="7" y1="13" x2="7" y2="13"/>
  <line x1="12" y1="13" x2="12" y2="13"/>
  <line x1="17" y1="13" x2="17" y2="13"/>
  <line x1="7" y1="16" x2="7" y2="16"/>
  <line x1="12" y1="16" x2="12" y2="16"/>
  <line x1="17" y1="16" x2="17" y2="16"/>
  <line x1="7" y1="19" x2="7" y2="19"/>
  <line x1="12" y1="19" x2="12" y2="19"/>
  <line x1="17" y1="19" x2="17" y2="19"/>
</svg>
