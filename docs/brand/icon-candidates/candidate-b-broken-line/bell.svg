<?xml version="1.0" encoding="UTF-8"?>
<!--
  Candidate B — Broken-Line Detail
  Icon: Bell (TopNav notifications)
  Stroke: 1.5px navy #48608a primary. Dashed grey-blue "ringing waves"
  flanking the bell — secondary structure that hints at sound/notification
  without resorting to a literal sound-wave cliché.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
     fill="none" stroke="#48608a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Bell">
  <!-- Bell body -->
  <path d="M12 3.25 v1.5"/>
  <path d="M5.75 17.25 V11 a6.25 6.25 0 0 1 12.5 0 v6.25"/>
  <line x1="4" y1="17.25" x2="20" y2="17.25"/>
  <path d="M10.25 20.25 a1.75 1.75 0 0 0 3.5 0"/>
  <!-- Ringing-wave hints (dashed, secondary) -->
  <path d="M2.5 9 a3 3 0 0 1 1.5 -2.5"
        stroke="#a0aec1" stroke-width="1" stroke-dasharray="2 2"/>
  <path d="M21.5 9 a3 3 0 0 0 -1.5 -2.5"
        stroke="#a0aec1" stroke-width="1" stroke-dasharray="2 2"/>
</svg>
