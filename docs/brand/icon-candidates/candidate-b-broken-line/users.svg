<?xml version="1.0" encoding="UTF-8"?>
<!--
  Candidate B — Broken-Line Detail
  Icon: Users (sidebar Employees, tenant header)
  Stroke: 1.5px navy #48608a primary. Secondary "roster row" beneath the
  figures rendered in pale grey-blue #a0aec1 with stroke-dasharray "3 3"
  per direction §2 ("subtle broken-line details for secondary structural
  lines"). The dashed row hints at "list of employees" without competing
  with the primary glyph — matches the empty-state illustration grammar.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
     fill="none" stroke="#48608a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Users">
  <!-- Foreground person -->
  <circle cx="9" cy="7.5" r="2.75"/>
  <path d="M4.5 17 a4.5 4.5 0 0 1 9 0"/>
  <!-- Background person -->
  <path d="M14.5 5.25 a2.5 2.5 0 0 1 0 4.5"/>
  <path d="M16 12 a4 4 0 0 1 3.5 5.75"/>
  <!-- Roster-row hint (dashed grey-blue secondary structure) -->
  <line x1="3" y1="20.75" x2="21" y2="20.75"
        stroke="#a0aec1" stroke-width="1.25" stroke-dasharray="3 3"/>
</svg>
