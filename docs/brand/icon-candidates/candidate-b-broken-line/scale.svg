<?xml version="1.0" encoding="UTF-8"?>
<!--
  Candidate B — Broken-Line Detail
  Icon: Scale (sidebar Liability)
  Stroke: 1.5px navy #48608a primary. Pan shadows rendered as dashed
  grey-blue arcs — adds physical depth (the pans "float" above their
  shadows) without breaking the strict line-art rule.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
     fill="none" stroke="#48608a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Scale">
  <!-- Central post + fulcrum -->
  <line x1="12" y1="4" x2="12" y2="20"/>
  <line x1="9" y1="20" x2="15" y2="20"/>
  <!-- Crossbar -->
  <line x1="4" y1="7" x2="20" y2="7"/>
  <!-- Suspension cords -->
  <line x1="5.5" y1="7" x2="4" y2="11"/>
  <line x1="5.5" y1="7" x2="7" y2="11"/>
  <line x1="18.5" y1="7" x2="17" y2="11"/>
  <line x1="18.5" y1="7" x2="20" y2="11"/>
  <!-- Pans -->
  <path d="M3.5 11 a2.5 2.5 0 0 0 4 0"/>
  <path d="M16.5 11 a2.5 2.5 0 0 0 4 0"/>
  <!-- Top hook -->
  <circle cx="12" cy="4" r="0.9" fill="#48608a" stroke="none"/>
  <!-- Pan shadows (dashed secondary structure) -->
  <path d="M3.75 13 a2.25 2.25 0 0 0 3.5 0"
        stroke="#a0aec1" stroke-width="1" stroke-dasharray="2 2"/>
  <path d="M16.75 13 a2.25 2.25 0 0 0 3.5 0"
        stroke="#a0aec1" stroke-width="1" stroke-dasharray="2 2"/>
</svg>
