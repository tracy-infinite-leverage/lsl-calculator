<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wordmark — monochrome navy variant.
  Drops the gold rule for use inside coloured fields where the gold accent
  would clash. Navy type only. Source: candidate-b.svg master, gold rule removed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" role="img" aria-label="LSL Calculator by Australian Payroll Association — monochrome">
  <defs>
    <style><![CDATA[
      .primary  { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; fill: #48608a; }
      .secondary{ font-family: 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; fill: #48608a; letter-spacing: 1.5px; }
    ]]></style>
  </defs>
  <text x="500" y="170" text-anchor="middle" class="primary" font-size="96" letter-spacing="-1.5">LSL Calculator</text>
  <text x="500" y="265" text-anchor="middle" class="secondary" font-size="26">by Australian Payroll Association</text>
</svg>
