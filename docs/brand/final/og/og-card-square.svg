<?xml version="1.0" encoding="UTF-8"?>
<!--
  OG card — 1200×1200 square fallback.
  Per icon-direction.md §8: white background; generous whitespace; wordmark
  centred with app-icon glyph beneath.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="LSL Calculator OG card (square)">
  <defs>
    <style><![CDATA[
      .primary  { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; fill: #48608a; }
      .secondary{ font-family: 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; fill: #48608a; letter-spacing: 1.8px; }
      .monogram { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; fill: #ffffff; letter-spacing: -1.4px; }
    ]]></style>
  </defs>
  <!-- White background -->
  <rect x="0" y="0" width="1200" height="1200" fill="#ffffff"/>

  <!-- Wordmark vertically centred, sitting above the icon -->
  <text x="600" y="540" text-anchor="middle" class="primary" font-size="120" letter-spacing="-1.8">LSL Calculator</text>
  <line x1="450" y1="584" x2="750" y2="584" stroke="#d9a428" stroke-width="5"/>
  <text x="600" y="650" text-anchor="middle" class="secondary" font-size="32">by Australian Payroll Association</text>

  <!-- App-icon glyph beneath, centred, 160×160 -->
  <g transform="translate(520, 760)">
    <rect x="0" y="0" width="160" height="160" rx="30" fill="#48608a"/>
    <text x="80" y="108" text-anchor="middle" class="monogram" font-size="58">LSL</text>
    <rect x="128" y="128" width="18" height="18" rx="2.5" fill="#d9a428"/>
  </g>
</svg>
